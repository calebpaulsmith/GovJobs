<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
		<meta name="color-scheme" content="dark light" />
		<script>
			// Apply saved theme before paint to prevent flash.
			try {
				var t = localStorage.getItem('fedfinder.public_map.theme.v1');
				document.documentElement.dataset.theme = (t === 'light' || t === 'dark') ? t : 'dark';
			} catch (e) {
				document.documentElement.dataset.theme = 'dark';
			}
		</script>
		<meta
			name="description"
			content="Layered, zoom-driven map of open USAJOBS postings, federal workforce, and locality-adjusted pay vs cost of living. Updated nightly. Not affiliated with the U.S. government."
		/>
		<meta property="og:title" content="FedFinder — Federal Job Map" />
		<meta
			property="og:description"
			content="Explore federal job postings, workforce data, and pay vs cost of living across the US. Updated nightly from USAJOBS and OPM."
		/>
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://map.thegrandpipeline.com/browse" />
		<meta property="og:image" content="https://map.thegrandpipeline.com/og-image.svg" />
		<meta property="og:image:type" content="image/svg+xml" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="FedFinder — Federal Job Map" />
		<meta
			name="twitter:description"
			content="Explore federal job postings, workforce data, and pay vs cost of living across the US."
		/>
		<meta name="twitter:image" content="https://map.thegrandpipeline.com/og-image.svg" />
		<link rel="canonical" href="https://map.thegrandpipeline.com/browse" />
		<title>FedFinder — Federal Job Map</title>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
