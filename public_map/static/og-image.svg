  <text x="82" y="118" fill="#7bd0f2" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="4">THE GRAND PIPELINE</text>
  <text x="80" y="225" fill="#e5edf5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="78" font-weight="800">Federal Job Map</text>
  <text x="82" y="298" fill="#cfd9e6" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="35">Postings · workforce · locality pay · cost of living</text>
  <text x="82" y="548" fill="#94a3b8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24">Not affiliated with the U.S. government</text>
